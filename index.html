<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>ESP32 Relay Control Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body>
  <h1>ESP32 Relay Control Dashboard</h1>

  <!-- Login -->
  <div id="loginForm">
    <input type="email" id="email" placeholder="Enter Email" required />
    <input type="password" id="password" placeholder="Enter Password" required />
    <button id="loginBtn">Login</button>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" style="display:none;">
    
    <!-- Relay 1 -->
    <div>
      <h2>Relay 1</h2>
      <p>Status: <span id="status1">Loading...</span></p>
      <button id="btn1">Toggle</button>
    </div>

    <!-- Relay 2 -->
    <div>
      <h2>Relay 2</h2>
      <p>Status: <span id="status2">Loading...</span></p>
      <button id="btn2">Toggle</button>
    </div>

    <button id="allOffBtn">All OFF</button>
    <button id="logoutBtn">Logout</button>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "YOUR_KEY",
      authDomain: "YOUR_DOMAIN",
      databaseURL: "YOUR_DB_URL",
    };

    firebase.initializeApp(firebaseConfig);

    const allowedEmail = "smartbox@gmail.com";
    const allowedPassword = "smartbox";

    const loginForm = document.getElementById("loginForm");
    const dashboard = document.getElementById("dashboard");

    document.getElementById("loginBtn").onclick = () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (email === allowedEmail && password === allowedPassword) {
        firebase.auth().signInWithEmailAndPassword(email, password)
          .then(() => {
            loginForm.style.display = "none";
            dashboard.style.display = "block";
            startRelayControl();
          })
          .catch(err => alert(err.message));
      } else {
        alert("Invalid credentials");
      }
    };

    function startRelayControl() {
      const db = firebase.database();

      const relays = [
        { id: 1, path: "relay1" },
        { id: 2, path: "relay2" }
      ];

      relays.forEach(relay => {
        const status = document.getElementById("status" + relay.id);
        const btn = document.getElementById("btn" + relay.id);
        const ref = db.ref(relay.path);

        ref.on("value", snap => {
          const val = snap.val();
          status.innerText = val ? "ON" : "OFF";
          btn.style.backgroundColor = val ? "green" : "blue";
        });

        btn.onclick = () => {
          ref.get().then(snap => {
            ref.set(!snap.val());
          });
        };
      });

      document.getElementById("allOffBtn").onclick = () => {
        relays.forEach(r => db.ref(r.path).set(false));
      };
    }

    document.getElementById("logoutBtn").onclick = () => {
      firebase.auth().signOut().then(() => {
        dashboard.style.display = "none";
        loginForm.style.display = "block";
      });
    };
  </script>
</body>
</html>
